<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0a0f0d" />
  <title>Thanks — RKAS Inc.</title>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f0d;
      --bg-deep: #060807;
      --surface: #141a17;
      --border: rgba(240, 242, 239, 0.08);
      --border-strong: rgba(240, 242, 239, 0.16);
      --chalk: #f0f2ef;
      --text: #d4d8d2;
      --muted: #8a918a;
      --orange: #e8892c;
      --orange-bright: #f59e3b;
      --orange-glow: rgba(232, 137, 44, 0.5);
      --success: #00d294;
      --success-glow: rgba(0, 210, 148, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 210, 148, 0.1), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(232, 137, 44, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 24px 48px;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .nav-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 6px;
    }

    .nav-name {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--chalk);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 0;
      animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .check-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: rgba(0, 210, 148, 0.12);
      border: 1px solid rgba(0, 210, 148, 0.3);
      margin-bottom: 28px;
      position: relative;
    }

    .check-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--success-glow), transparent 70%);
      filter: blur(12px);
      z-index: -1;
    }

    .check-wrap svg {
      width: 38px;
      height: 38px;
      stroke: var(--success);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: clamp(32px, 5vw, 44px);
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--chalk);
      margin: 0 0 14px;
      line-height: 1.15;
    }

    .lede {
      font-size: 17px;
      color: var(--muted);
      margin: 0 auto 36px;
      max-width: 460px;
      line-height: 1.6;
    }

    .back {
      display: inline-block;
      padding: 13px 24px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--chalk);
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .back:hover {
      border-color: var(--orange);
      color: var(--orange-bright);
      background: rgba(232, 137, 44, 0.06);
    }

    .footer {
      text-align: center;
      padding-top: 24px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .container { padding: 20px 16px 32px; }
      .check-wrap { width: 72px; height: 72px; margin-bottom: 22px; }
      .check-wrap svg { width: 32px; height: 32px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <img src="assets/logo.jpg" alt="" class="nav-logo" />
      <span class="nav-name">RKAS Inc.</span>
    </nav>

    <main>
      <div>
        <div class="check-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"/></svg>
        </div>
        <h1>Briefing requested</h1>
        <p class="lede">Thanks for reaching out. We've received your request and will be in touch shortly to schedule your strategy briefing.</p>
        <a href="index.html" class="back">Back to home</a>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; <span id="year"></span> RKAS Inc.</p>
    </footer>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
